<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkHub: Valentino 23</title>
    <!-- Emmet: link:css → TAB -->
    <link rel="stylesheet" href="style.css" />
    <!-- Шрифти з Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <!-- Emmet: div.card>img.avatar+h2.name+p.status+div.links>a.btn*4 → TAB -->
    <div class="card">
      <img
        class="avatar"
        src="https://api.dicebear.com/9.x/pixel-art/svg?seed=Valentino"
        alt="Avatar"
      />
      <h2 class="name">Valentino new 21</h2>
      <p class="status">💻 Developer & IT Teacher · NEW Kolomyia</p>

      <div class="links">
        <a class="btn" href="https://github.com" target="_blank">
          <span class="btn-icon">🐙</span> GitHub
        </a>
        <a class="btn" href="https://instagram.com" target="_blank">
          <span class="btn-icon">📸</span> Instagram
        </a>
        <a class="btn" href="https://t.me" target="_blank">
          <span class="btn-icon">✈️</span> Telegram
        </a>
        <a class="btn" href="https://tiktok.com" target="_blank">
          <span class="btn-icon">🎵</span> TikTok
        </a>
      </div>

      <!-- Кнопка для JS-інтерактиву -->
      <button class="theme-btn" id="themeToggle">🌙 Темна тема</button>
    </div>

    <!-- Emmet: script:src → TAB -->
    <script src="script.js"></script>
  </body>
</html>
